
services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app:cached

  ui:
    build: .
    command: ["streamlit", "run", "ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - web
    volumes:
      - ./:/app:cached

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: credit
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
