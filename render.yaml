services:
  - type: web
    name: loan-decision-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health

  - type: web
    name: loan-decision-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/app.py --server.headless true --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: API_BASE_URL
        sync: false
